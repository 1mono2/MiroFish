previews:
  generation: automatic

services:
  - type: web
    name: mirofish-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: FLASK_DEBUG=false FLASK_PORT=$PORT python run.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - .env.example
        - render.yaml
    disk:
      name: mirofish-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: ZEP_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: UPLOAD_FOLDER
        value: /data/uploads
      - key: LOG_DIR
        value: /data/logs
      - key: OASIS_SIMULATION_DATA_DIR
        value: /data/uploads/simulations
      - key: TASKS_DIR
        value: /data/uploads/tasks

  - type: web
    name: mirofish-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: mirofish-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
